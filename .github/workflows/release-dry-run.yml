name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  repository_dispatch:
    types:
      - release-dry-run

permissions:
  contents: write

jobs:
  dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate CHANGELOG.md state
        shell: bash
        run: |
          test -f CHANGELOG.md
          if grep -q '<<<<<<<\|=======\|>>>>>>>' CHANGELOG.md; then
            echo "CHANGELOG.md contains merge conflict markers."
            exit 1
          fi
          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "CHANGELOG.md is missing the '## [Unreleased]' heading."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand

      - name: Bump version
        id: bump
        shell: bash
        env:
          WORKFLOW_BUMP: ${{ github.event.inputs.version }}
          DISPATCH_BUMP: ${{ github.event.client_payload.version }}
        run: |
          RELEASE_BUMP="$WORKFLOW_BUMP"
          if [ -z "$RELEASE_BUMP" ]; then
            RELEASE_BUMP="$DISPATCH_BUMP"
          fi
          if [ -z "$RELEASE_BUMP" ]; then
            echo "Release bump type was not provided."
            exit 1
          fi

          npm version "$RELEASE_BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: node scripts/release/generate-release-notes.mjs "${{ steps.bump.outputs.version }}" RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: node scripts/release/update-changelog.mjs "${{ steps.bump.outputs.version }}" "${{ steps.bump.outputs.release_date }}" RELEASE_NOTES.md CHANGELOG.md

      - name: Verify npm tarball
        shell: bash
        run: npm pack --dry-run | tee PACK_OUTPUT.txt

      - name: Capture release diff
        shell: bash
        run: |
          git --no-pager diff -- package.json package-lock.json CHANGELOG.md > RELEASE_DIFF.patch
          git --no-pager status --short > RELEASE_STATUS.txt

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run-v${{ steps.bump.outputs.version }}
          path: |
            RELEASE_NOTES.md
            PACK_OUTPUT.txt
            RELEASE_DIFF.patch
            RELEASE_STATUS.txt
            CHANGELOG.md
            package.json
            package-lock.json
