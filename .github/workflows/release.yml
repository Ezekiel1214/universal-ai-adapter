name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  repository_dispatch:
    types:
      - release-publish

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured."
            exit 1
          fi

      - name: Validate CHANGELOG.md state
        shell: bash
        run: |
          test -f CHANGELOG.md
          if grep -q '<<<<<<<\|=======\|>>>>>>>' CHANGELOG.md; then
            echo "CHANGELOG.md contains merge conflict markers."
            exit 1
          fi
          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "CHANGELOG.md is missing the '## [Unreleased]' heading."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        shell: bash
        env:
          WORKFLOW_BUMP: ${{ github.event.inputs.version }}
          DISPATCH_BUMP: ${{ github.event.client_payload.version }}
        run: |
          RELEASE_BUMP="$WORKFLOW_BUMP"
          if [ -z "$RELEASE_BUMP" ]; then
            RELEASE_BUMP="$DISPATCH_BUMP"
          fi
          if [ -z "$RELEASE_BUMP" ]; then
            echo "Release bump type was not provided."
            exit 1
          fi

          npm version "$RELEASE_BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: node scripts/release/generate-release-notes.mjs "${{ steps.bump.outputs.version }}" RELEASE_NOTES.md

      - name: Update CHANGELOG.md
        run: node scripts/release/update-changelog.mjs "${{ steps.bump.outputs.version }}" "${{ steps.bump.outputs.release_date }}" RELEASE_NOTES.md CHANGELOG.md

      - name: Commit release metadata
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): publish v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"

      - name: Push branch and tag
        run: git push origin master --follow-tags

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.bump.outputs.version }}" --title "v${{ steps.bump.outputs.version }}" --notes-file RELEASE_NOTES.md
