name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
  repository_dispatch:
    types:
      - release-publish

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      RELEASE_BUMP: ${{ github.event.inputs.version || github.event.client_payload.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release secrets
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is not configured."
            exit 1
          fi
          if [ -z "$RELEASE_BUMP" ]; then
            echo "Release bump type was not provided."
            exit 1
          fi

      - name: Validate CHANGELOG.md state
        shell: bash
        run: |
          test -f CHANGELOG.md
          if grep -q '<<<<<<<\|=======\|>>>>>>>' CHANGELOG.md; then
            echo "CHANGELOG.md contains merge conflict markers."
            exit 1
          fi
          if ! grep -q '^## \[Unreleased\]$' CHANGELOG.md; then
            echo "CHANGELOG.md is missing the '## [Unreleased]' heading."
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        shell: bash
        run: |
          npm version "$RELEASE_BUMP" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_date=$(date -u +%F)" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.bump.outputs.version }}"
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          PREVIOUS_RELEASE_COMMIT=$(git log --grep='^chore(release): publish v' --format='%H' -n 1 || true)

          if [ -n "$PREVIOUS_TAG" ]; then
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f previous_tag_name="$PREVIOUS_TAG" \
              --jq '.body' > RELEASE_NOTES.md
          else
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              --jq '.body' > RELEASE_NOTES.md
          fi

          if ! grep -q "^## What's Changed" RELEASE_NOTES.md && ! grep -q '^- ' RELEASE_NOTES.md; then
            if [ -n "$PREVIOUS_RELEASE_COMMIT" ]; then
              COMMITS=$(git log "$PREVIOUS_RELEASE_COMMIT"..HEAD --no-merges --pretty=format:'- %s (%h)' | grep -v '^- chore(release): publish v' || true)
            else
              COMMITS=$(git log -n 20 --no-merges --pretty=format:'- %s (%h)' | grep -v '^- chore(release): publish v' || true)
            fi

            if [ -z "$COMMITS" ]; then
              COMMITS='- No user-facing changes were detected in this release window.'
            fi

            cat > RELEASE_NOTES.md <<EOF
## What's Changed

$COMMITS
EOF
          fi

      - name: Update CHANGELOG.md
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.bump.outputs.version }}
          RELEASE_DATE: ${{ steps.bump.outputs.release_date }}
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          changelog_path = Path('CHANGELOG.md')
          content = changelog_path.read_text(encoding='utf-8')
          notes = Path('RELEASE_NOTES.md').read_text(encoding='utf-8').strip()
          version = os.environ['RELEASE_VERSION']
          release_date = os.environ['RELEASE_DATE']
          section = f"## [{version}] - {release_date}\n\n{notes}\n\n"

          marker = '## [Unreleased]\n\n'
          if marker not in content:
              raise SystemExit("CHANGELOG.md must contain the exact '## [Unreleased]' section header followed by a blank line.")

          updated = content.replace(marker, marker + section, 1)
          changelog_path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit release metadata
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): publish v${{ steps.bump.outputs.version }}"
          git tag "v${{ steps.bump.outputs.version }}"

      - name: Push branch and tag
        run: git push origin master --follow-tags

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.bump.outputs.version }}" --title "v${{ steps.bump.outputs.version }}" --notes-file RELEASE_NOTES.md
