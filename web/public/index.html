<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal AI Adapter</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-tertiary: #1a1a25;
      --bg-hover: #222230;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent-primary: #6366f1;
      --accent-secondary: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --border-color: #2a2a3a;
      --success: #22c55e;
      --error: #ef4444;
      --warning: #f59e0b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 0;
      margin-bottom: 24px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .provider-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .provider-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid transparent;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
    }

    .provider-btn:hover {
      background: var(--bg-hover);
      border-color: var(--border-color);
    }

    .provider-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-secondary);
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .provider-btn .status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-left: auto;
    }

    .provider-btn .status.online { background: var(--success); }
    .provider-btn .status.offline { background: var(--error); }
    .provider-btn .status.unknown { background: var(--text-muted); }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .model-select {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .model-select label {
      font-size: 13px;
      color: var(--text-secondary);
    }

    select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 16px 20px;
      border-radius: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      background: var(--accent-primary);
      border-bottom-right-radius: 4px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border-bottom-left-radius: 4px;
    }

    .message.error {
      align-self: flex-start;
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid var(--error);
      color: var(--error);
    }

    .message.streaming {
      background: var(--bg-tertiary);
      border: 1px solid var(--accent-primary);
    }

    .input-area {
      padding: 20px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-color);
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      background: var(--accent-primary);
      border: none;
      border-radius: 12px;
      padding: 14px 24px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .send-btn:hover {
      background: var(--accent-secondary);
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .config-panel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 360px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      padding: 24px;
      transform: translateX(100%);
      transition: transform 0.3s ease;
      overflow-y: auto;
      z-index: 100;
    }

    .config-panel.open {
      transform: translateX(0);
    }

    .config-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .close-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      color: var(--text-primary);
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-primary);
    }

    .form-group .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .save-btn {
      width: 100%;
      background: var(--accent-primary);
      border: none;
      border-radius: 10px;
      padding: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
    }

    .save-btn:hover {
      background: var(--accent-secondary);
    }

    .config-toggle {
      position: fixed;
      right: 20px;
      top: 20px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      z-index: 50;
    }

    .config-toggle:hover {
      background: var(--bg-hover);
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      gap: 16px;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      opacity: 0.5;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--accent-primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); }
      40% { transform: scale(1); }
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
        padding: 12px;
      }
      .logo-text, .section-title, .provider-btn span {
        display: none;
      }
      .provider-btn {
        justify-content: center;
        padding: 12px;
      }
      .message {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">🤖</div>
        <span class="logo-text">AI Adapter</span>
      </div>

      <div class="section-title">Providers</div>
      <div class="provider-list" id="providerList"></div>
    </aside>

    <main class="main">
      <header class="header">
        <div class="model-select">
          <label>Model:</label>
          <select id="modelSelect"></select>
          <button onclick="loadModels()" title="Refresh models">🔄</button>
        </div>
        <button class="config-toggle" onclick="toggleConfig()">⚙️ Settings</button>
      </header>

      <div class="chat-container" id="chatContainer">
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
          </svg>
          <p>Start a conversation</p>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
          <button class="icon-btn" onclick="document.getElementById('imageInput').click()" title="Add image">📎</button>
          <input type="text" id="messageInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            <span>Send</span>
            <span>→</span>
          </button>
        </div>
        <div id="imagePreview" style="display:none; margin-top:10px; padding:10px;">
          <img id="previewImg" style="max-width:200px; max-height:100px; border-radius:8px;">
          <button onclick="clearImage()" style="margin-left:10px;">✕</button>
        </div>
      </div>
    </main>

    <div class="config-panel" id="configPanel">
      <div class="config-title">
        Provider Settings
        <button class="close-btn" onclick="toggleConfig()">×</button>
      </div>

      <div class="form-group">
        <label>API Key / Base URL</label>
        <input type="text" id="configApiKey" placeholder="API key or Ollama URL">
        <div class="hint" id="configHint">For Ollama: http://localhost:11434</div>
      </div>

      <div class="form-group">
        <label>Temperature</label>
        <input type="number" id="configTemp" value="0.7" min="0" max="2" step="0.1">
      </div>

      <div class="form-group">
        <label>Max Tokens</label>
        <input type="number" id="configMaxTokens" value="2048" min="1" max="128000">
      </div>

      <button class="save-btn" onclick="saveConfig()">Save Configuration</button>
    </div>
  </div>

  <script>
    const API_BASE = '';
    let currentProvider = 'ollama';
    let messages = [];
    let config = {
      apiKey: '',
      temperature: 0.7,
      maxTokens: 2048
    };

    const providers = [
      { id: 'ollama', name: 'Ollama', icon: '🐳', free: true },
      { id: 'openai', name: 'OpenAI', icon: '🔵', free: false },
      { id: 'anthropic', name: 'Anthropic', icon: '🟤', free: false },
      { id: 'groq', name: 'Groq', icon: '🟣', free: true },
      { id: 'deepseek', name: 'DeepSeek', icon: '🔷', free: true }
    ];

    const models = {
      openai: ['gpt-4o', 'gpt-4o-mini', 'gpt-4o-realtime-preview', 'o1', 'o1-mini'],
      anthropic: ['claude-sonnet-4-20250514', 'claude-3-5-sonnet-20241022', 'claude-3-opus-20240229'],
      groq: ['llama-3.3-70b-versatile', 'llama-3.1-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768'],
      deepseek: ['deepseek-chat', 'deepseek-coder'],
      ollama: ['llama3.2:latest', 'llama3.2', 'llama3', 'mistral', 'codellama']
    };

    async function loadModels() {
      try {
        const res = await fetch(`${API_BASE}/api/models`);
        const data = await res.json();
        console.log('Models loaded:', data);
        Object.assign(models, data);
      } catch (e) {
        console.error('Failed to load models', e);
      }
      renderProviders();
      // Auto-select first Ollama model if available
      if (models.ollama && models.ollama.length > 0) {
        const select = document.getElementById('modelSelect');
        select.value = models.ollama[0];
      }
    }

    function renderProviders() {
      const list = document.getElementById('providerList');
      list.innerHTML = providers.map(p => `
        <button class="provider-btn ${p.id === currentProvider ? 'active' : ''}" onclick="selectProvider('${p.id}')">
          <span>${p.icon}</span>
          <span>${p.name}</span>
          ${p.free ? '<span style="font-size:10px;opacity:0.6">FREE</span>' : ''}
          <span class="status unknown" id="status-${p.id}"></span>
        </button>
      `).join('');
      
      updateModelSelect();
      checkProviderStatus();
    }

    function updateModelSelect() {
      const select = document.getElementById('modelSelect');
      const providerModels = models[currentProvider] || [];
      
      if (providerModels.length === 0) {
        select.innerHTML = '<option value="">Default</option>';
        select.disabled = true;
      } else {
        select.innerHTML = providerModels.map(m => `<option value="${m}">${m}</option>`).join('');
        select.disabled = false;
      }
    }

    async function checkProviderStatus() {
      for (const provider of providers) {
        const statusEl = document.getElementById(`status-${provider.id}`);
        if (!statusEl) continue;
        
        try {
          const res = await fetch(`${API_BASE}/api/providers/status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              provider: provider.id,
              apiKey: provider.id === 'ollama' ? 'http://localhost:11434' : config.apiKey,
              baseURL: provider.id === 'ollama' ? 'http://localhost:11434' : undefined
            })
          });
          const statuses = await res.json();
          const status = statuses.find(s => s.provider === provider.id);
          statusEl.className = `status ${status?.available ? 'online' : 'offline'}`;
        } catch {
          statusEl.className = 'status offline';
        }
      }
    }

    function selectProvider(id) {
      currentProvider = id;
      renderProviders();
      
      const hint = document.getElementById('configHint');
      if (id === 'ollama') {
        hint.textContent = 'For Ollama: http://localhost:11434';
      } else {
        hint.textContent = `Enter ${id} API key`;
      }
    }

    function toggleConfig() {
      document.getElementById('configPanel').classList.toggle('open');
    }

    function saveConfig() {
      config.apiKey = document.getElementById('configApiKey').value;
      config.temperature = parseFloat(document.getElementById('configTemp').value);
      config.maxTokens = parseInt(document.getElementById('configMaxTokens').value);
      toggleConfig();
      checkProviderStatus();
    }

    function handleKeyPress(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const message = input.value.trim();
      
      if (!message) return;

      input.value = '';
      sendBtn.disabled = true;
      
      document.getElementById('emptyState')?.remove();
      
      messages.push({ role: 'user', content: message });
      addMessage('user', message);
      
      const assistantMsg = addMessage('assistant', '', true);
      
      try {
        const model = document.getElementById('modelSelect').value;
        const baseURL = currentProvider === 'ollama' ? (config.apiKey || 'http://localhost:11434') : undefined;
        
        const res = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            provider: currentProvider,
            apiKey: currentProvider === 'ollama' ? undefined : config.apiKey,
            baseURL,
            model,
            messages,
            temperature: config.temperature,
            maxTokens: config.maxTokens,
            stream: true
          })
        });

        if (!res.ok) {
          const err = await res.json();
          assistantMsg.classList.add('error');
          assistantMsg.querySelector('.content').textContent = `Error: ${err.error || 'Unknown error'}`;
          sendBtn.disabled = false;
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let content = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const text = decoder.decode(value);
          const lines = text.split('\n');
          
          for (const line of lines) {
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.content) {
                  content += data.content;
                  assistantMsg.querySelector('.content').textContent = content;
                }
              } catch {}
            }
          }
        }

        messages.push({ role: 'assistant', content });
      } catch (error) {
        assistantMsg.classList.add('error');
        let errorMsg = `Error: ${error.message}`;
        
        if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
          errorMsg = '❌ Cannot connect to server. Make sure the server is running.';
        } else if (error.message.includes('All providers failed')) {
          errorMsg = '❌ All AI providers failed. Check:\n• Ollama is running (http://localhost:11434)\n• API keys are configured for paid providers';
        } else if (error.message.includes('ECONNREFUSED')) {
          errorMsg = '❌ Connection refused. Is Ollama running?';
        }
        
        assistantMsg.querySelector('.content').textContent = errorMsg;
      }

      sendBtn.disabled = false;
    }

    function addMessage(role, content, streaming = false) {
      const container = document.getElementById('chatContainer');
      const div = document.createElement('div');
      div.className = `message ${role}${streaming ? ' streaming' : ''}`;
      div.innerHTML = `<span class="content">${content}</span>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      return div;
    }

    loadModels();
  </script>
</body>
</html>
